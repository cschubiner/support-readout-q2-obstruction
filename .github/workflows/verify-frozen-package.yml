name: Verify frozen package

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  hash-and-lean:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify frozen hash manifest
        run: shasum -a 256 -c docs/support_readout_q2_public_mirror_SHA256SUMS.txt

      - name: Install Lean toolchain manager
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install pinned Lean toolchain
        run: |
          cd docs/support_readout_q2_lean_verification
          elan toolchain install "$(cat lean-toolchain)"

      - name: Build Lean core
        run: |
          cd docs/support_readout_q2_lean_verification
          lake build SupportReadoutQ2
          lean SupportReadoutQ2.lean
